<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title>Destellos Hero Logo</title>
  <defs>
    <radialGradient id="defaultHeroGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fbcfe8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="defaultHeroText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="320" height="120" rx="36" fill="url(#defaultHeroGlow)"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Poppins, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="url(#defaultHeroText)">Destellos</text>
  <text x="50%" y="78%" dominant-baseline="middle" text-anchor="middle" font-family="Poppins, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#7f1d1d" opacity="0.8">Aromas &amp; detalles artesanales</text>
</svg>
